<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f1f"/>
      <stop offset="100%" style="stop-color:#0d1a3a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Glow ring -->
  <circle cx="256" cy="200" r="120" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.4"/>
  <!-- House icon -->
  <path d="M256 100 L160 185 L160 290 L352 290 L352 185 Z" fill="none" stroke="url(#glow)" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"/>
  <rect x="222" y="230" width="68" height="60" rx="6" fill="url(#glow)" opacity="0.8"/>
  <!-- Wifi dots -->
  <circle cx="256" cy="340" r="6" fill="#3b82f6"/>
  <path d="M230 325 Q256 310 282 325" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <path d="M210 308 Q256 285 302 308" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- FANTA text (white) -->
  <text x="256" y="420" font-family="'Inter','Segoe UI',sans-serif" font-weight="800" font-size="72" fill="#ffffff" text-anchor="middle" letter-spacing="2">FANTA</text>
  <!-- TECH text (orange) -->
  <text x="256" y="480" font-family="'Inter','Segoe UI',sans-serif" font-weight="800" font-size="52" fill="#ff8c00" text-anchor="middle" letter-spacing="4">TECH</text>
</svg>
