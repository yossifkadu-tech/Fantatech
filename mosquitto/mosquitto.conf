# Mosquitto MQTT Broker - Fantatech Smart Home Hub

listener 1883
allow_anonymous true

# WebSocket support (for browser clients)
listener 9001
protocol websockets
allow_anonymous true

# Persistence
persistence true
persistence_location C:/Users/My laptop/Desktop/smarthome-hub/mosquitto/data/

# Logging
log_dest file C:/Users/My laptop/Desktop/smarthome-hub/mosquitto/log/mosquitto.log
log_type all

# Max connections
max_connections 100
