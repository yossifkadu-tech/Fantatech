  </defs>
  <ellipse cx="100" cy="135" rx="55" ry="3.5" fill="#000" opacity="0.12"/>
  <!-- door slab hint -->
  <rect x="20" y="20" width="160" height="110" rx="6" fill="#fafafa" stroke="#e5e5ea" stroke-width="1"/>
  <!-- lock body (cylinder) -->
  <circle cx="100" cy="75" r="48" fill="url(#lockBody)" stroke="#86868b" stroke-width="0.5"/>
  <circle cx="100" cy="75" r="40" fill="#fff"/>
  <!-- keypad ring -->
