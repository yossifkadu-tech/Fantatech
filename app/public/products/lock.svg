    <circle cx="100" cy="46" r="3"/>
    <circle cx="120" cy="56" r="3"/>
    <circle cx="120" cy="94" r="3"/>
    <circle cx="100" cy="104" r="3"/>
    <circle cx="80" cy="94" r="3"/>
    <circle cx="80" cy="56" r="3"/>
  </g>
  <!-- fingerprint center -->
  <g fill="none" stroke="#0071e3" stroke-width="2" stroke-linecap="round">
    <path d="M100 65 Q90 75 100 85"/>
    <path d="M100 60 Q86 75 100 90"/>
    <path d="M100 70 Q94 75 100 80"/>
