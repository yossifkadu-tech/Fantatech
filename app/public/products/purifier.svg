<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purifBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e5e5ea"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="135" rx="42" ry="3" fill="#000" opacity="0.12"/>
  <!-- airflow lines -->
  <g stroke="#5e9eff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M80 22 Q82 14 88 14"/>
    <path d="M100 18 Q102 8 110 10"/>
