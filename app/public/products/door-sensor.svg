<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="100" cy="135" rx="42" ry="3" fill="#000" opacity="0.1"/>
  <!-- door frame hint -->
  <rect x="30" y="20" width="140" height="110" rx="6" fill="#fafafa" stroke="#e5e5ea"/>
  <!-- door split line -->
  <line x1="100" y1="20" x2="100" y2="130" stroke="#e5e5ea" stroke-dasharray="3 3"/>
  <!-- sensor main -->
  <rect x="60" y="50" width="36" height="64" rx="6" fill="#fff" stroke="#d2d2d7"/>
  <circle cx="78" cy="60" r="2" fill="#34c759"/>
  <!-- sensor magnet -->
  <rect x="104" y="56" width="18" height="52" rx="5" fill="#fff" stroke="#d2d2d7"/>
  <!-- signal arcs between them -->
  <g stroke="#0071e3" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M97 78 Q100 76 103 78"/>
    <path d="M97 84 Q100 80 103 84"/>
  </g>
</svg>
