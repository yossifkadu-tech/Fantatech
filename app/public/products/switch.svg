<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="swPlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f7"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="135" rx="40" ry="3" fill="#000" opacity="0.1"/>
  <!-- wall plate -->
  <rect x="50" y="14" width="100" height="120" rx="6" fill="url(#swPlate)" stroke="#d2d2d7" stroke-width="1"/>
  <!-- rocker frame -->
  <rect x="68" y="32" width="64" height="88" rx="6" fill="#fafafa" stroke="#e5e5ea"/>
  <!-- on (top) -->
  <rect x="74" y="38" width="52" height="36" rx="4" fill="#0071e3"/>
  <text x="100" y="60" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">ON</text>
  <!-- off (bottom) -->
  <rect x="74" y="78" width="52" height="36" rx="4" fill="#ffffff" stroke="#e5e5ea"/>
  <text x="100" y="100" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#86868b" text-anchor="middle">OFF</text>
  <!-- LED indicator -->
  <circle cx="100" cy="24" r="2" fill="#34c759"/>
</svg>
