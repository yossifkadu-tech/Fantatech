<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skPlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f7"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="135" rx="42" ry="3" fill="#000" opacity="0.1"/>
  <!-- wall plate -->
  <rect x="50" y="14" width="100" height="120" rx="6" fill="url(#skPlate)" stroke="#d2d2d7" stroke-width="1"/>
  <!-- socket recessed -->
  <circle cx="100" cy="60" r="32" fill="#fafafa" stroke="#e5e5ea"/>
  <!-- Israeli SI-32 3-pin holes -->
  <circle cx="100" cy="46" r="3" fill="#1d1d1f"/>
  <circle cx="88" cy="70" r="3" fill="#1d1d1f"/>
  <circle cx="112" cy="70" r="3" fill="#1d1d1f"/>
  <!-- USB ports row -->
  <rect x="74" y="106" width="22" height="6" rx="1" fill="#1d1d1f"/>
  <rect x="76" y="108" width="18" height="2" fill="#ffffff"/>
  <rect x="104" y="106" width="22" height="6" rx="3" fill="#1d1d1f"/>
  <!-- LED -->
  <circle cx="100" cy="24" r="2" fill="#34c759"/>
</svg>
