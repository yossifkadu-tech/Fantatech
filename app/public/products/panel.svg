<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pnlBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1d1f"/>
      <stop offset="100%" stop-color="#2a2a2e"/>
    </linearGradient>
    <linearGradient id="pnlScreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0071e3"/>
      <stop offset="100%" stop-color="#5e9eff"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="138" rx="62" ry="3" fill="#000" opacity="0.1"/>
  <!-- panel body -->
  <rect x="22" y="14" width="156" height="118" rx="10" fill="url(#pnlBody)"/>
  <!-- screen -->
  <rect x="30" y="22" width="140" height="102" rx="5" fill="url(#pnlScreen)"/>
  <!-- header bar -->
  <text x="40" y="38" font-family="Inter, -apple-system, sans-serif" font-size="7" font-weight="600" fill="#ffffff" opacity="0.9">21:34</text>
  <text x="160" y="38" font-family="Inter, -apple-system, sans-serif" font-size="7" fill="#ffffff" text-anchor="end" opacity="0.7">22°</text>
  <!-- tiles grid 3x2 -->
  <rect x="38" y="46" width="38" height="34" rx="4" fill="#ffffff" opacity="0.95"/>
  <rect x="82" y="46" width="38" height="34" rx="4" fill="#ffffff" opacity="0.95"/>
  <rect x="126" y="46" width="36" height="34" rx="4" fill="#ffffff" opacity="0.95"/>
  <rect x="38" y="84" width="38" height="34" rx="4" fill="#ffffff" opacity="0.95"/>
  <rect x="82" y="84" width="38" height="34" rx="4" fill="#ffffff" opacity="0.95"/>
  <rect x="126" y="84" width="36" height="34" rx="4" fill="#ffffff" opacity="0.95"/>
  <!-- small accent dots inside tiles -->
  <circle cx="57" cy="62" r="3" fill="#0071e3"/>
  <circle cx="101" cy="62" r="3" fill="#34c759"/>
  <circle cx="144" cy="62" r="3" fill="#f59f00"/>
  <circle cx="57" cy="100" r="3" fill="#5e9eff"/>
  <circle cx="101" cy="100" r="3" fill="#0071e3"/>
  <circle cx="144" cy="100" r="3" fill="#0071e3"/>
</svg>
