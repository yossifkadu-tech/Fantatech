<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="thermFace" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#5e9eff"/>
      <stop offset="100%" stop-color="#0058b8"/>
    </radialGradient>
    <linearGradient id="thermRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#d2d2d7"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="132" rx="52" ry="3.5" fill="#000" opacity="0.12"/>
  <!-- outer ring -->
  <circle cx="100" cy="75" r="55" fill="url(#thermRing)"/>
  <circle cx="100" cy="75" r="52" fill="#f5f5f7"/>
  <!-- inner face -->
  <circle cx="100" cy="75" r="40" fill="url(#thermFace)"/>
  <!-- temperature -->
  <text x="100" y="83" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#fff">22°</text>
  <text x="100" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#fff" opacity="0.85">HEAT</text>
  <!-- tick marks -->
  <g stroke="#86868b" stroke-width="1.5" stroke-linecap="round">
    <line x1="100" y1="24" x2="100" y2="29"/>
    <line x1="148" y1="60" x2="143" y2="62"/>
    <line x1="148" y1="90" x2="143" y2="88"/>
    <line x1="52" y1="60" x2="57" y2="62"/>
    <line x1="52" y1="90" x2="57" y2="88"/>
  </g>
</svg>
